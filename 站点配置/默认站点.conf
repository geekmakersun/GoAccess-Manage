# ============================================================
# GoAccess 站点配置 - 默认站点
# 说明：这是一个默认配置示例，请根据实际情况修改
# ============================================================

# ============================================================
# 基础配置（必须配置）
# ============================================================

# 站点显示名称（可选，用于标识）
site-name="默认站点"

# Nginx 访问日志文件的完整路径（必须配置）
# 宝塔面板默认路径格式：/www/wwwlogs/您的域名.log
log-file="/www/wwwlogs/default.log"

# 数据库文件路径（必须配置，用于数据持久化）
db-path="/www/wwwroot/历史数据/默认站点.db"

# HTML 分析报告的输出路径（必须配置）
output-html="/www/wwwroot/default/site-log.html"

# ============================================================
# 日志格式配置
# ============================================================

# 日志格式（必须配置）
# 常用格式：
#   COMBINED  - Nginx/Apache 组合格式（推荐，包含 User-Agent 和 Referer）
#   COMMON    - 通用日志格式（基础信息）
#   VCOMBINED - 带虚拟主机的组合格式
#   VCOMMON   - 带虚拟主机的通用格式
#   W3C       - IIS W3C 格式
#   SQUID     - Squid 原生格式
#   CLOUDFRONT - AWS CloudFront 格式
log-format=COMBINED

# ============================================================
# 高级配置（可选）
# ============================================================

# 启用 GeoIP2 支持（需要安装 libmaxminddb）
# geoip-database="/usr/share/GeoIP/GeoLite2-City.mmdb"

# 忽略指定的 IP 地址或范围
# ignore-ip=127.0.0.1
# ignore-ip=192.168.1.0/24

# 忽略指定的请求路径
# ignore-path=/wp-admin/
# ignore-path=/static/

# 自定义时间格式（如果日志格式不是标准格式）
# time-format=%H:%M:%S
# date-format=%d/%b/%Y

# 启用实时 HTML 报告（需要 WebSocket 支持）
# real-time-html true

# 报告刷新间隔（秒）
# html-refresh-rate=60

# 保持数据库同步（秒）
# db-sync=300

# 启用 UTF-8 支持
# enable-utf8 true

# 启用颜色输出（终端模式）
# color-scheme=1